<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | Zuchy Vortex Media</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <!-- External Resources -->
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyan: '#00CFEF',
                        noir: '#050505',
                        charcoal: '#0a0a0a',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        editorial: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-noir text-white min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 px-8 py-6 flex justify-between items-center mix-blend-difference">
        <a href="index.html" class="flex items-center gap-4 group">
            <i class="ph ph-arrow-left text-xl group-hover:-translate-x-2 transition-transform"></i>
            <span class="text-[0.7rem] uppercase tracking-[0.3em] font-bold">Back to Portfolio</span>
        </a>
        <img src="assets/logo.png" alt="Logo" class="h-10">
    </nav>

    <main class="flex-grow flex items-center justify-center py-32 px-6">
        <div class="max-w-4xl w-full grid md:grid-cols-2 gap-20">
            
            <div class="fade-up">
                <span class="text-cyan text-xs font-bold tracking-[0.4em] uppercase mb-6 block">Get in Touch</span>
                <h1 class="text-6xl md:text-7xl font-black mb-12 tracking-tight-custom">LET'S <span class="font-editorial italic font-normal text-white/40">TALK</span>.</h1>
                <p class="text-gray-muted text-lg font-light leading-relaxed mb-12">
                    Have a vision you want to bring to life? I'm always open to new projects, creative collaborations, and meaningful conversations.
                </p>
                
                <div class="space-y-8">
                    <div class="flex items-center gap-6 group cursor-pointer">
                        <div class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center group-hover:border-cyan group-hover:text-cyan transition-all">
                            <i class="ph ph-envelope text-xl"></i>
                        </div>
                        <div>
                            <span class="block text-[0.6rem] uppercase tracking-widest text-gray-muted mb-1">Email Me</span>
                            <a href="mailto:zuchyvortex@gmail.com" class="text-lg font-medium hover:text-cyan transition-colors">zuchyvortex@gmail.com</a>
                        </div>
                    </div>
                    <div class="flex items-center gap-6 group cursor-pointer">
                        <div class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center group-hover:border-cyan group-hover:text-cyan transition-all">
                            <i class="ph ph-whatsapp-logo text-xl"></i>
                        </div>
                        <div>
                            <span class="block text-[0.6rem] uppercase tracking-widest text-gray-muted mb-1">WhatsApp</span>
                            <a href="https://wa.me/233551361198" target="_blank" class="text-lg font-medium hover:text-cyan transition-colors">+233 551 361 198</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-charcoal p-12 border border-white/5 rounded-3xl fade-up" style="transition-delay: 0.2s;">
                <form action="#" class="space-y-6">
                    <div>
                        <label class="block text-[0.6rem] uppercase tracking-widest text-gray-muted mb-3">Full Name</label>
                        <input type="text" placeholder="John Doe" class="w-full bg-noir border border-white/10 rounded-xl px-6 py-4 focus:border-cyan outline-none transition-all placeholder:text-white/10">
                    </div>
                    <div>
                        <label class="block text-[0.6rem] uppercase tracking-widest text-gray-muted mb-3">Email Address</label>
                        <input type="email" placeholder="john@example.com" class="w-full bg-noir border border-white/10 rounded-xl px-6 py-4 focus:border-cyan outline-none transition-all placeholder:text-white/10">
                    </div>
                    <div>
                        <label class="block text-[0.6rem] uppercase tracking-widest text-gray-muted mb-3">Message</label>
                        <textarea rows="4" placeholder="Tell me about your project..." class="w-full bg-noir border border-white/10 rounded-xl px-6 py-4 focus:border-cyan outline-none transition-all placeholder:text-white/10"></textarea>
                    </div>
                    <button type="submit" class="w-full btn-premium btn-cyan py-5 text-sm">Send Message</button>
                </form>
            </div>

        </div>
    </main>

    <footer class="py-12 px-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 bg-noir">
        <p class="text-white/30 text-[0.6rem] uppercase tracking-widest">© 2026 Zuchy Vortex Media</p>
        <div class="flex gap-8">
            <a href="#" class="text-white/30 hover:text-cyan transition-colors"><i class="ph ph-instagram-logo text-xl"></i></a>
            <a href="#" class="text-white/30 hover:text-cyan transition-colors"><i class="ph ph-tiktok-logo text-xl"></i></a>
            <a href="#" class="text-white/30 hover:text-cyan transition-colors"><i class="ph ph-pinterest-logo text-xl"></i></a>
            <a href="#" class="text-white/30 hover:text-cyan transition-colors"><i class="ph ph-dribbble-logo text-xl"></i></a>
            <a href="#" class="text-white/30 hover:text-cyan transition-colors"><i class="ph ph-linkedin-logo text-xl"></i></a>
        </div>
    </footer>

    <!-- Background Music -->
    <audio id="bgMusic" loop preload="auto">
        <source src="assets/music.mp3" type="audio/mpeg">
    </audio>
    <button id="musicToggle" class="fixed bottom-32 right-10 z-50 w-14 h-14 rounded-full border border-white/10 flex items-center justify-center hover:border-cyan hover:text-cyan transition-all bg-noir/80 backdrop-blur music-toggle-premium">
        <i class="ph ph-music-note text-2xl" id="music-icon"></i>
    </button>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

        // Music Logic
        const bgMusic = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        const musicIcon = document.getElementById('music-icon');
        let isPlaying = false;

        function toggleMusic() {
            if (!isPlaying) {
                bgMusic.play().catch(e => console.log("Autoplay blocked, waiting for interaction"));
                musicIcon.classList.replace('ph-music-note', 'ph-pause');
                musicToggle.classList.add('border-cyan', 'text-cyan', 'active');
            } else {
                bgMusic.pause();
                musicIcon.classList.replace('ph-pause', 'ph-music-note');
                musicToggle.classList.remove('border-cyan', 'text-cyan', 'active');
            }
            isPlaying = !isPlaying;
        }

        musicToggle.addEventListener('click', toggleMusic);
    </script>
</body>
</html>
